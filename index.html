<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100vh;
    width: 100vw;
  }
</style>
</head>
<body>
<script>
  document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
      e.preventDefault();
      window.location.href = "https://clever.com";
    }
  });
</script>
</body>
</html>
